version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cringy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cringy
      POSTGRES_PASSWORD: cringypassword
      POSTGRES_DB: cringy_nostalgia
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
